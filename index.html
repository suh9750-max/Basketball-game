<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 ARCADE HOOPS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; height:100vh; width:100vw; }
canvas { display:block; }
#ui {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 32px;
  background:linear-gradient(180deg,rgba(0,0,0,0.95),transparent);
  pointer-events:none; z-index:10;
}
.hblock { text-align:center; }
.hlabel { font-family:'Orbitron',monospace; font-size:0.5rem; letter-spacing:4px; color:#FF6A00; }
.hval   { font-family:'Orbitron',monospace; font-size:2rem; font-weight:900; color:#FFD060;
          text-shadow:0 0 20px rgba(255,200,60,.9); }
#timerV { color:#fff; }
#timerV.danger { color:#FF2020; animation:blink .4s infinite alternate; }
@keyframes blink { to { opacity:.4; } }
#streaks {
  position:fixed; top:70px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; z-index:10; pointer-events:none;
}
.dot { width:12px; height:12px; border-radius:50%;
       background:rgba(255,255,255,.07); border:1px solid rgba(255,106,0,.3); transition:all .25s; }
.dot.on { background:#FF6A00; box-shadow:0 0 12px #FF6A00; }
#camBox {
  position:fixed; bottom:16px; right:16px;
  width:200px; height:150px;
  border:2px solid rgba(255,106,0,.7); border-radius:8px;
  overflow:hidden; z-index:20; background:#000;
  box-shadow:0 0 20px rgba(255,106,0,.3);
}
#camLabel {
  position:absolute; top:4px; left:7px;
  font-family:'Orbitron',monospace; font-size:.48rem;
  letter-spacing:2px; color:rgba(255,140,30,.9); z-index:21;
}
#camCvs { width:100%; height:100%; transform:scaleX(-1); display:block; }
#statusMsg {
  position:fixed; bottom:176px; left:50%; transform:translateX(-50%);
  font-family:'Orbitron',monospace; font-size:.62rem; letter-spacing:2px;
  color:rgba(255,200,100,.85); z-index:30; pointer-events:none;
  text-shadow:0 0 10px rgba(255,180,0,.5); white-space:nowrap;
}
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:50;
  background:radial-gradient(ellipse at center, rgba(4,0,14,.95), rgba(0,0,0,.98));
}
.screen h1 {
  font-family:'Orbitron',monospace; font-size:3rem; font-weight:900;
  color:#FF6A00; letter-spacing:6px; margin-bottom:8px;
  text-shadow:0 0 50px rgba(255,106,0,.9), 0 4px 0 #5A2000;
}
.screen p { color:rgba(255,200,140,.7); font-family:'Orbitron',monospace;
            font-size:.75rem; letter-spacing:2px; margin-bottom:20px; }
.igrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; max-width:440px; }
.icard { background:rgba(255,106,0,.08); border:1px solid rgba(255,106,0,.22);
         border-radius:8px; padding:12px; text-align:center; }
.iicon { font-size:1.8rem; }
.itxt  { font-size:.72rem; color:rgba(255,210,160,.9); margin-top:4px;
         font-family:'Orbitron',monospace; letter-spacing:.4px; }
.btn {
  padding:14px 52px; border:none; border-radius:6px; cursor:pointer;
  font-family:'Orbitron',monospace; font-size:1rem; font-weight:900;
  letter-spacing:3px; color:#fff;
  background:linear-gradient(135deg,#FF6A00,#C03800);
  box-shadow:0 6px 30px rgba(255,106,0,.5);
  transition:transform .15s, box-shadow .15s;
}
.btn:hover { transform:translateY(-2px); box-shadow:0 10px 40px rgba(255,106,0,.7); }
#combo {
  position:fixed; top:36%; left:50%; transform:translate(-50%,-50%);
  font-family:'Orbitron',monospace; font-size:3.5rem; font-weight:900;
  color:#FFD060; pointer-events:none; z-index:40; opacity:0;
  text-shadow:0 0 60px rgba(255,208,60,1), 0 4px 0 #7A4000; letter-spacing:4px;
}
</style>
</head>
<body>

<canvas id="gc"></canvas>
<div id="ui">
  <div class="hblock"><div class="hlabel">BEST</div><div class="hval" id="bestV">0</div></div>
  <div class="hblock"><div class="hlabel">SCORE</div><div class="hval" id="scoreV">0</div></div>
  <div class="hblock"><div class="hlabel">TIME</div><div class="hval" id="timerV">60</div></div>
</div>
<div id="streaks">
  <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
</div>
<div id="camBox">
  <div id="camLabel">📷 HAND CAM</div>
  <canvas id="camCvs"></canvas>
</div>
<div id="statusMsg"></div>
<video id="vid" style="display:none" autoplay playsinline muted></video>
<div id="combo"></div>

<div class="screen" id="startSc">
  <canvas id="titleBall" style="display:block;margin:0 auto 8px"></canvas>
  <h1>ARCADE HOOPS</h1>
  <p>양손으로 공을 집어 골대에 던지세요!</p>
  <div class="igrid">
    <div class="icard"><div class="iicon">🤲</div><div class="itxt">양손을 공 가까이<br>가져다 대세요</div></div>
    <div class="icard"><div class="iicon">⬆️</div><div class="itxt">양손을 빠르게<br>위로 올려 슛!</div></div>
    <div class="icard"><div class="iicon">🏀</div><div class="itxt">바닥 공을 하나씩<br>집어서 던져요</div></div>
    <div class="icard"><div class="iicon">🔥</div><div class="itxt">연속 성공시<br>콤보 보너스!</div></div>
  </div>
  <button class="btn" id="startBtn">INSERT COIN 🪙</button>
  <p style="margin-top:12px;font-size:.6rem;opacity:.5">웹캠 없으면 마우스로 플레이 가능</p>
</div>

<div class="screen" id="overSc" style="display:none">
  <h1>GAME OVER</h1>
  <div id="finalTxt" style="font-family:'Orbitron',monospace;font-size:2rem;color:#FFD060;margin:10px 0"></div>
  <div id="newBestMsg" style="display:none;color:#39FF14;font-family:'Orbitron',monospace;font-size:.85rem;letter-spacing:3px;margin-bottom:14px">🏆 NEW RECORD!</div>
  <button class="btn" id="restartBtn">PLAY AGAIN</button>
</div>

<script>
// ════════════════════════════════════════════════════
// CANVAS
// ════════════════════════════════════════════════════
const gc   = document.getElementById('gc');
const ctx  = gc.getContext('2d');
const cc   = document.getElementById('camCvs');
const cctx = cc.getContext('2d');
let W=0, H=0;

function resize(){
  W = gc.width  = window.innerWidth;
  H = gc.height = window.innerHeight;
  cc.width=200; cc.height=150;
  hoop.x=W/2; hoop.y=H*.12;
  if(!gs.running) resetPile();
}
window.addEventListener('resize', resize);

// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const BR   = 328;
const GRAV = 0.28;

// ════════════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════════════
const gs = {
  score:0, best:+(localStorage.getItem('ah3_best')||0),
  timeLeft:60, streak:0, running:false, tim:null
};
const hoop = { x:0, y:0, rimW:368, phase:0 };

// ════════════════════════════════════════════════════
// BALLS
// ════════════════════════════════════════════════════
let pile      = [];
let flyBalls  = [];
let heldBall  = null;
let netSwing  = 0;

function resetPile(){
  pile=[]; flyBalls=[]; heldBall=null;
  const by = H - BR - 14;
  // 공이 매우 크므로 화면 중앙 하단에 1개씩
  pile.push({x:W/2, y:by, r:BR, seed:0, spin:0});
}

function addBallToPile(){
  const by = H - BR - 14;
  pile.push({x:W/2, y:by, r:BR, seed:Math.random()*400, spin:0});
}

// ════════════════════════════════════════════════════
// SOUND  (Web Audio API — no external files needed)
// ════════════════════════════════════════════════════
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playGrab(){
  try{
    const ac = getAudio();
    // 짧은 "툭" 소리 — 저주파 충격음
    const buf = ac.createBuffer(1, ac.sampleRate*0.12, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const t=i/ac.sampleRate;
      d[i] = Math.sin(2*Math.PI*120*t) * Math.exp(-t*38) * 0.8
           + (Math.random()*2-1) * Math.exp(-t*60) * 0.3;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.55, ac.currentTime);
    src.connect(gain); gain.connect(ac.destination);
    src.start();
  } catch(e){}
}

function playThrow(){
  try{
    const ac = getAudio();
    // "휙" 슈팅 소리 — 피치가 내려가는 스윕
    const dur  = 0.22;
    const buf  = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    const d    = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const t = i/ac.sampleRate;
      const freq = 900 * Math.exp(-t*9);
      d[i] = Math.sin(2*Math.PI*freq*t) * Math.exp(-t*14) * 0.6
           + (Math.random()*2-1) * Math.exp(-t*18) * 0.15;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.45, ac.currentTime);
    src.connect(gain); gain.connect(ac.destination);
    src.start();
  } catch(e){}
}

function playScore(){
  try{
    const ac = getAudio();
    // "스와시" 득점음 — 상승 화음
    [[220,0],[330,0.04],[440,0.08],[660,0.13]].forEach(([freq,delay])=>{
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime+delay);
      osc.frequency.exponentialRampToValueAtTime(freq*1.5, ac.currentTime+delay+0.18);
      gain.gain.setValueAtTime(0.25, ac.currentTime+delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+0.35);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(ac.currentTime+delay);
      osc.stop(ac.currentTime+delay+0.4);
    });
  } catch(e){}
}


let parts=[], pops=[];
function spark(x,y,c,n=20){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*8;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-5,c,sz:6+Math.random()*6,life:55,ml:55});
  }
}
function addPop(x,y,t,big){ pops.push({x,y,t,life:70,big}); }

// ════════════════════════════════════════════════════
// HAND STATE
// ════════════════════════════════════════════════════
let hands     = {L:null, R:null};
let hist      = {L:[], R:[]};
const HLEN    = 12;
let cool      = 0;
let mouseMode = false;
let frame     = 0;
let mx=0, my=0;

function toSc(nx,ny){ return {x:(1-nx)*W, y:ny*H}; }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }

function hvel(k){
  const h=hist[k];
  if(!h||h.length<4) return {x:0,y:0};
  const a=h[0], b=h[h.length-1];
  const dt=(b.t-a.t)/1000||0.05;
  return {x:(b.x-a.x)/dt, y:(b.y-a.y)/dt};
}

// ════════════════════════════════════════════════════
// HAND INPUT → GAME LOGIC
// ════════════════════════════════════════════════════
function processHands(){
  if(!gs.running) return;
  if(cool>0){ cool--; return; }

  const hL=hands.L, hR=hands.R;

  // Both hands required
  if(!hL || !hR){
    if(heldBall){
      heldBall.vx=0; heldBall.vy=4;
      flyBalls.push(heldBall);
      heldBall=null;
    }
    return;
  }

  const ls  = toSc(hL.px, hL.py);
  const rs  = toSc(hR.px, hR.py);
  const midX = (ls.x+rs.x)/2;
  const midY = (ls.y+rs.y)/2;

  // Move + throw held ball
  if(heldBall){
    heldBall.x = midX;
    heldBall.y = midY;
    const vL=hvel('L'), vR=hvel('R');
    // velY는 normalized 좌표 기준 (초당 변화량) — 0.3 이상 위로 움직이면 던짐
    const velY=(vL.y+vR.y)/2;
    const velX=(vL.x+vR.x)/2;
    if(velY < -0.3){
      // 골대까지 정확히 도달하는 초기속도 역산
      // x방향: hoop.x까지, y방향: hoop.y까지 포물선으로
      const dx = hoop.x - heldBall.x;
      const dy = hoop.y - heldBall.y; // 음수 (골대가 위)

      // 비행 프레임 수 추정: 손 속도에 따라 32~55프레임
      const speedScale = Math.min(Math.abs(velY), 2.5) / 2.5;
      const T = 55 - speedScale * 23; // 느리면 55프레임, 빠르면 32프레임

      // vy0: 골대 y에 T프레임 후 도달하려면?  dy = vy0*T + 0.5*GRAV*T^2
      const vy0 = (dy - 0.5 * GRAV * T * T) / T;
      // vx0: 골대 x에 T프레임 후 도달
      const vx0 = dx / T;

      heldBall.vx = vx0;
      heldBall.vy = vy0;
      heldBall.baseR = heldBall.r;
      heldBall.held = false;
      flyBalls.push(heldBall);
      heldBall = null;
      playThrow();
      cool = 18;
    }
    return;
  }

  // Grab from pile — both hands near same ball
  for(let i=0;i<pile.length;i++){
    const b=pile[i];
    if(dist(ls.x,ls.y,b.x,b.y)<b.r+160 && dist(rs.x,rs.y,b.x,b.y)<b.r+160){
      heldBall={x:b.x,y:b.y,r:b.r,vx:0,vy:0,spin:0,held:true,trail:[]};
      pile.splice(i,1);
      playGrab();
      setStatus('');
      break;
    }
  }
}

// ════════════════════════════════════════════════════
// MEDIAPIPE — dynamic load
// ════════════════════════════════════════════════════
function setStatus(msg){ document.getElementById('statusMsg').textContent=msg; }

function loadScript(src){
  return new Promise(resolve=>{
    const s=document.createElement('script');
    s.src=src; s.crossOrigin='anonymous';
    s.onload=resolve;
    s.onerror=()=>{ console.warn('Failed to load',src); resolve(); };
    document.head.appendChild(s);
  });
}

async function initMP(){
  setStatus('📷 카메라 연결 중...');
  await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js');
  await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js');
  await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js');

  if(typeof Hands==='undefined'){
    setStatus('⚠️ MediaPipe 로드 실패 → 마우스 모드');
    enableMouse(); return;
  }

  try{
    const mp=new Hands({
      locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
    });
    mp.setOptions({
      maxNumHands:2,
      modelComplexity:1,
      minDetectionConfidence:0.72,
      minTrackingConfidence:0.65,
    });

    mp.onResults(res=>{
      cctx.save(); cctx.scale(-1,1); cctx.drawImage(res.image,-200,0,200,150); cctx.restore();
      hands.L=null; hands.R=null;
      if(res.multiHandLandmarks && res.multiHandedness){
        res.multiHandLandmarks.forEach((lm,i)=>{
          const raw=res.multiHandedness[i].label;
          const k=raw==='Left'?'R':'L';
          const px=(lm[0].x+lm[9].x)/2, py=(lm[0].y+lm[9].y)/2;
          hands[k]={px,py,lm};
          hist[k].push({x:px,y:py,t:Date.now()});
          if(hist[k].length>HLEN) hist[k].shift();
          cctx.save(); cctx.scale(-1,1); cctx.translate(-200,0);
          if(typeof drawConnectors!=='undefined'){
            drawConnectors(cctx,lm,HAND_CONNECTIONS,{color:k==='L'?'#00EEFF':'#FF8020',lineWidth:1.5});
            drawLandmarks(cctx,lm,{color:k==='L'?'#00EEFF':'#FF8020',lineWidth:1,radius:2});
          }
          cctx.restore();
        });
      }
      processHands();
    });

    const vid=document.getElementById('vid');
    const cam=new Camera(vid,{
      onFrame: async()=>{ if(mp) await mp.send({image:vid}); },
      width:640, height:480,
    });
    await cam.start();
    setStatus('✅ 손 인식 활성화! 양손을 공 가까이 대세요');
    setTimeout(()=>setStatus(''),3000);
  } catch(e){
    console.warn('MP error:',e);
    setStatus('⚠️ 웹캠 오류 → 마우스 모드로 전환');
    enableMouse();
  }
}

// ════════════════════════════════════════════════════
// MOUSE / TOUCH FALLBACK
// ════════════════════════════════════════════════════
function enableMouse(){
  mouseMode=true;
  document.getElementById('camBox').style.display='none';
  let drag=false, mhist=[];

  function tryGrab(px,py){
    if(heldBall){ drag=true; mhist=[{x:px,y:py,t:Date.now()}]; return; }
    for(let i=0;i<pile.length;i++){
      const b=pile[i];
      if(dist(px,py,b.x,b.y)<b.r+60){
        heldBall={x:b.x,y:b.y,r:b.r,vx:0,vy:0,spin:0,held:true,trail:[]};
        pile.splice(i,1); drag=true; mhist=[{x:px,y:py,t:Date.now()}];
        playGrab(); return;
      }
    }
  }
  function moveDrag(px,py){
    mx=px; my=py;
    if(!drag||!heldBall) return;
    heldBall.x=px; heldBall.y=py;
    mhist.push({x:px,y:py,t:Date.now()});
    if(mhist.length>12) mhist.shift();
  }
  function release(){
    if(!drag) return; drag=false;
    if(heldBall && mhist.length>=3){
      const a=mhist[0], b=mhist[mhist.length-1];
      const dt=(b.t-a.t)/1000||0.05;
      const vx=(b.x-a.x)/dt, vy=(b.y-a.y)/dt;
      if(vy<-120){
        const dx=hoop.x-heldBall.x, dy=hoop.y-heldBall.y;
        const speedScale=Math.min(Math.abs(vy),1200)/1200;
        const T = 55 - speedScale * 23;
        heldBall.vx = dx / T;
        heldBall.vy = (dy - 0.5 * GRAV * T * T) / T;
        heldBall.baseR = heldBall.r;
        heldBall.held=false; flyBalls.push(heldBall); heldBall=null;
        playThrow(); return;
      }
    }
    if(heldBall){ heldBall=null; addBallToPile(); }
  }
  gc.addEventListener('mousedown',e=>{ if(!gs.running)return; const r=gc.getBoundingClientRect(); tryGrab(e.clientX-r.left,e.clientY-r.top); });
  gc.addEventListener('mousemove',e=>{ const r=gc.getBoundingClientRect(); moveDrag(e.clientX-r.left,e.clientY-r.top); });
  gc.addEventListener('mouseup',release);
  gc.addEventListener('mouseleave',release);
  gc.addEventListener('touchstart',e=>{ e.preventDefault(); if(!gs.running)return; const r=gc.getBoundingClientRect(),t=e.touches[0]; tryGrab(t.clientX-r.left,t.clientY-r.top); },{passive:false});
  gc.addEventListener('touchmove',e=>{ e.preventDefault(); const r=gc.getBoundingClientRect(),t=e.touches[0]; moveDrag(t.clientX-r.left,t.clientY-r.top); },{passive:false});
  gc.addEventListener('touchend',e=>{ e.preventDefault(); release(); },{passive:false});
}

// ════════════════════════════════════════════════════
// SCORE
// ════════════════════════════════════════════════════
let lastScoreT=0;
function onScore(b){
  gs.streak++; gs.score+=2;
  document.getElementById('scoreV').textContent=gs.score;
  netSwing=2.8;
  playScore();
  spark(hoop.x,hoop.y+40,'#FFD060',30);
  spark(hoop.x,hoop.y+40,'#FF6A00',15);
  addPop(hoop.x,hoop.y-40,gs.streak>=3?`🔥+${gs.streak*2}`:'+2',gs.streak>=3);
  if(gs.streak>=3) showCombo(gs.streak);
  updateStreak();
  b.scored=true;
  b.vx=0;
  b.vy=18;  // 빠르게 아래로
  // 새 공은 여기서 예약하지 않음 — 공이 화면 밖으로 사라진 후에 생성
}
function showCombo(n){
  const el=document.getElementById('combo');
  const m=['','','','3 COMBO 🔥','ON FIRE 🔥🔥','GOD MODE!!'];
  el.textContent=m[Math.min(n,5)]||n+'x COMBO!';
  el.style.opacity='1'; el.style.transform='translate(-50%,-50%) scale(1.2)';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{
    el.style.transition='opacity .5s,transform .5s';
    el.style.opacity='0'; el.style.transform='translate(-50%,-50%) scale(.75)';
    setTimeout(()=>{ el.style.transition='none'; },550);
  },950);
}
function updateStreak(){ for(let i=0;i<5;i++) document.getElementById('d'+i).classList.toggle('on',i<gs.streak); }

// PHYSICS
// ════════════════════════════════════════════════════
function update(){
  frame++;
  hoop.phase+=0.013;
  if(gs.score>=20) hoop.x=W/2+Math.sin(hoop.phase)*Math.min((gs.score-18)*1.6,130);
  netSwing*=0.96;

  flyBalls=flyBalls.filter(b=>{
    if(b._remove) return false;
    b.vy += GRAV;
    b.x  += b.vx;
    b.y  += b.vy;
    b.spin += b.vx * 0.003;
    b.vx *= 0.994;

    // ── 원근감: y위치 기반으로만 크기 변화 ──
    // 화면 하단(출발)=풀사이즈, 골대 높이=최소크기, 그 아래 다시 복원
    if(b.baseR){
      if(!b.scored){
        // 던지는 중: 위로 올라갈수록 작아짐
        // hoop.y 근처에서 가장 작게 (0.35배), 출발점(H)에서 1.0배
        const t = Math.max(0, Math.min(1, (b.y - hoop.y) / (H * 0.7 - hoop.y)));
        b.r = b.baseR * (0.35 + t * 0.65);
      } else {
        // 득점 후: 크기 그대로 유지하고 아래로 떨어짐
        b.r = b.baseR * 0.35; // 골대에서의 크기 고정
      }
    }

    if(!b.trail) b.trail=[];
    b.trail.push({x:b.x, y:b.y, r:b.r});
    if(b.trail.length>14) b.trail.shift();

    if(b.x-b.r<0){b.x=b.r; b.vx*=-.5;}
    if(b.x+b.r>W){b.x=W-b.r; b.vx*=-.5;}

    // 화면 아래로 완전히 사라지면 제거 + 새 공 생성
    if(b.y - b.r > H + 20){
      if(b.scored){
        // 득점 후 떨어진 공 → 즉시 새 공
        if(gs.running) addBallToPile();
      } else {
        // 미스 → 스트릭 리셋 후 새 공
        gs.streak=0; updateStreak();
        if(gs.running) addBallToPile();
      }
      return false;
    }

    checkCollision(b);
    return true;
  });

  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.2; p.vx*=.97; p.life--; p.sz*=.965; });
  pops=pops.filter(p=>p.life>0);
  pops.forEach(p=>{ p.y-=1.3; p.life--; });
}

function checkCollision(b){
  const rL=hoop.x-hoop.rimW/2, rR=hoop.x+hoop.rimW/2, ry=hoop.y;
  const now=Date.now();

  // 득점 판정: 공 중심이 림 안쪽을 통과할 때
  // 공 중심 x가 림 안쪽 구간에 있고, y가 림 높이 근처를 아래 방향으로 통과
  const inX = b.x > rL + 30 && b.x < rR - 30;
  const crossY = b.y > ry - 20 && b.y < ry + b.r * 0.8;
  if(inX && crossY && b.vy > 0){
    if(now-lastScoreT>600){ lastScoreT=now; onScore(b); }
    return;
  }

  // 림 충돌: 림 왼쪽/오른쪽 끝 포인트와 공 중심 거리
  const rimRadius = 24; // 림 두께 반지름
  [rL, rR].forEach(rx=>{
    const dx=b.x-rx, dy=b.y-ry;
    const d=Math.hypot(dx,dy);
    if(d < rimRadius + 20 && d > 0){
      const nx=dx/d, ny=dy/d;
      const dot=b.vx*nx+b.vy*ny;
      if(dot < 0){ // 충돌 방향일 때만
        b.vx=(b.vx-2*dot*nx)*0.38;
        b.vy=(b.vy-2*dot*ny)*0.38;
        const overlap=rimRadius+20-d;
        b.x+=nx*overlap; b.y+=ny*overlap;
      }
    }
  });
}

function drawBG(){
  ctx.fillStyle='#06040F'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=0.11;
  for(let y=0;y<H;y+=4){ ctx.fillStyle='#000'; ctx.fillRect(0,y,W,2); }
  ctx.restore();
  const flY=H*0.80;
  const wlg=ctx.createLinearGradient(0,0,W*.2,0);
  wlg.addColorStop(0,'#0A0020'); wlg.addColorStop(1,'#050010');
  ctx.fillStyle=wlg; ctx.fillRect(0,0,W*.2,flY);
  const wrg=ctx.createLinearGradient(W*.8,0,W,0);
  wrg.addColorStop(0,'#050010'); wrg.addColorStop(1,'#0A0020');
  ctx.fillStyle=wrg; ctx.fillRect(W*.8,0,W*.2,flY);
  const bwg=ctx.createLinearGradient(0,0,0,flY);
  bwg.addColorStop(0,'#0D0824'); bwg.addColorStop(1,'#080518');
  ctx.fillStyle=bwg; ctx.fillRect(W*.2,0,W*.6,flY);
  drawMachine(W*.04,flY*.92,'#0A001A','#FF00CC');
  drawMachine(W*.14,flY*.94,'#001418','#00FFD0');
  drawMachine(W*.86,flY*.92,'#0A001A','#FF6600');
  drawMachine(W*.96,flY*.94,'#001418','#FF0077');
  [[W*.25],[W*.5],[W*.75]].forEach(([lx])=>{
    const bl=ctx.createRadialGradient(lx,0,0,lx,0,W*.22);
    bl.addColorStop(0,'rgba(255,230,160,.1)'); bl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bl; ctx.fillRect(0,0,W,H*.4);
    ctx.save(); ctx.shadowColor='rgba(255,230,160,1)'; ctx.shadowBlur=14;
    ctx.fillStyle='rgba(255,248,210,.95)'; ctx.fillRect(lx-38,0,76,5); ctx.restore();
  });
  drawNeonText(W*.1,H*.1,'SLAM\nDUNK','#FF00BB',W*.022);
  drawNeonText(W*.9,H*.1,'3 POINT\nSHOT','#00FFD0',W*.018);
  const flg=ctx.createLinearGradient(0,flY,0,H);
  flg.addColorStop(0,'#0C0028'); flg.addColorStop(1,'#050012');
  ctx.fillStyle=flg; ctx.fillRect(0,flY,W,H-flY);
  ctx.save(); ctx.lineWidth=1;
  for(let i=0;i<=8;i++){
    const t=i/8,y=flY+t*(H-flY),a=.06+t*.22;
    ctx.strokeStyle=`rgba(160,0,255,${a})`;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  for(let i=-12;i<=12;i++){
    const bx2=W/2+i*(W/11);
    ctx.strokeStyle='rgba(160,0,255,0.06)';
    ctx.beginPath(); ctx.moveTo(W/2,flY); ctx.lineTo(bx2,H); ctx.stroke();
  }
  ctx.restore();
  const fs=ctx.createLinearGradient(0,flY-2,0,flY+10);
  fs.addColorStop(0,'rgba(180,0,255,0)'); fs.addColorStop(.5,'rgba(180,0,255,0.42)'); fs.addColorStop(1,'rgba(180,0,255,0)');
  ctx.fillStyle=fs; ctx.fillRect(0,flY-2,W,14);
  const vig=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,W*.9);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
}
function drawMachine(cx,fy,body,neon){
  const mw=W*.076,mh=H*.34,mx2=cx-mw/2,my2=fy-mh;
  ctx.fillStyle=body;
  ctx.beginPath();
  ctx.moveTo(mx2+5,my2); ctx.lineTo(mx2+mw-5,my2);
  ctx.lineTo(mx2+mw,my2+10); ctx.lineTo(mx2+mw,my2+mh);
  ctx.lineTo(mx2,my2+mh); ctx.lineTo(mx2,my2+10); ctx.closePath(); ctx.fill();
  const nr=parseInt(neon.slice(1,3),16),ng=parseInt(neon.slice(3,5),16),nb2=parseInt(neon.slice(5,7),16);
  ctx.save(); ctx.globalAlpha=.16+.06*Math.sin(frame*.05+cx);
  ctx.fillStyle=`rgb(${nr},${ng},${nb2})`;
  ctx.fillRect(mx2+mw*.15,my2+mh*.1,mw*.7,mh*.48); ctx.restore();
  ctx.save(); ctx.shadowColor=neon; ctx.shadowBlur=18;
  ctx.strokeStyle=neon; ctx.lineWidth=1.5; ctx.globalAlpha=.36+.12*Math.sin(frame*.04+cx*.01);
  ctx.beginPath();
  ctx.moveTo(mx2+5,my2); ctx.lineTo(mx2+mw-5,my2);
  ctx.lineTo(mx2+mw,my2+10); ctx.lineTo(mx2+mw,my2+mh);
  ctx.lineTo(mx2,my2+mh); ctx.lineTo(mx2,my2+10); ctx.closePath(); ctx.stroke(); ctx.restore();
}
function drawNeonText(cx,cy,txt,col,size){
  const lines=txt.split('\n');
  ctx.save(); ctx.textAlign='center';
  ctx.font=`900 ${Math.max(size,12)}px Orbitron,monospace`;
  ctx.shadowColor=col; ctx.shadowBlur=22; ctx.fillStyle=col;
  lines.forEach((l,i)=>{
    ctx.globalAlpha=.62+.16*Math.sin(frame*.05+i*.8);
    ctx.fillText(l,cx,cy+i*(size*1.32));
  });
  ctx.restore();
}

function drawGoal(){
  const bx=hoop.x,by=hoop.y,rW=hoop.rimW;
  const bbW=200,bbH=118,bbX=bx-bbW/2,bbY=by-130;
  // Pole
  const pg=ctx.createLinearGradient(bx-5,0,bx+5,0);
  pg.addColorStop(0,'#2A2A2A'); pg.addColorStop(.4,'#888'); pg.addColorStop(.7,'#555'); pg.addColorStop(1,'#1A1A1A');
  ctx.fillStyle=pg; ctx.fillRect(bx-5,by-50,10,H*.55);
  // Backboard
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowBlur=28; ctx.shadowOffsetY=10;
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.moveTo(bbX+bbW,bbY); ctx.lineTo(bbX+bbW+16,bbY-8);
  ctx.lineTo(bbX+bbW+16,bbY+bbH-8); ctx.lineTo(bbX+bbW,bbY+bbH); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#1C1C1C';
  ctx.beginPath(); ctx.moveTo(bbX,bbY); ctx.lineTo(bbX+bbW,bbY);
  ctx.lineTo(bbX+bbW+16,bbY-8); ctx.lineTo(bbX+16,bbY-8); ctx.closePath(); ctx.fill();
  const bbg=ctx.createLinearGradient(bbX,bbY,bbX+bbW,bbY+bbH);
  bbg.addColorStop(0,'#26263A'); bbg.addColorStop(.5,'#32323F'); bbg.addColorStop(1,'#1A1A28');
  ctx.fillStyle=bbg; ctx.fillRect(bbX,bbY,bbW,bbH);
  ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=2.5; ctx.strokeRect(bbX,bbY,bbW,bbH);
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2; ctx.strokeRect(bx-33,by-80,66,45);
  ctx.restore();
  // Rim
  const rL=bx-rW/2, rR=bx+rW/2, rimH=16;
  ctx.fillStyle='#444'; ctx.fillRect(bx-6,by-20,12,22);
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=12; ctx.shadowOffsetY=5;
  ctx.fillStyle='#6A1000';
  ctx.beginPath(); ctx.ellipse(bx,by+rimH*.6,rW/2+2,rimH*.38,0,0,Math.PI*2); ctx.fill();
  const rg=ctx.createLinearGradient(rL,by,rR,by);
  rg.addColorStop(0,'#881400'); rg.addColorStop(.15,'#EE3000');
  rg.addColorStop(.5,'#FF5018'); rg.addColorStop(.85,'#EE3000'); rg.addColorStop(1,'#881400');
  ctx.fillStyle=rg; ctx.beginPath(); ctx.ellipse(bx,by,rW/2,rimH*.35,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,120,70,.75)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(bx,by-2,rW/2-4,rimH*.25,0,0,Math.PI*2); ctx.stroke();
  [rL+10,rR-10].forEach(bx2=>{
    ctx.fillStyle='#666'; ctx.beginPath(); ctx.arc(bx2,by,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#AAA'; ctx.beginPath(); ctx.arc(bx2-1,by-1,2.5,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
  drawNet(bx,by,rW,rimH);
}

function drawNet(bx,by,rW,rimH){
  const nd=220;          // 네트 길이 (72→220, 3배 이상)
  const seg=14;          // 세로 줄 수
  const sw=netSwing*52;  // 흔들림 강도 (18→52)
  const rings=10;        // 가로 링 수 (6→10)

  ctx.save(); ctx.lineWidth=1.2;

  // ── 세로 줄 ──
  for(let i=0;i<=seg;i++){
    const t=i/seg, angle=t*Math.PI*2;
    const tx=bx+Math.cos(angle)*(rW/2);
    const ty=by+Math.sin(angle)*(rimH*.33);

    // 흔들림: 각 줄마다 위상 다르게 → 물결 효과
    const phase=Math.sin(t*Math.PI*2)*sw;
    const sway=phase;

    const al=Math.max(.22,.8-Math.abs(Math.cos(angle))*.3);
    ctx.strokeStyle=`rgba(230,230,255,${al})`;
    ctx.beginPath(); ctx.moveTo(tx,ty);

    // 각 줄을 12개 세그먼트로 부드럽게
    for(let j=1;j<=12;j++){
      const r=j/12;
      // 아래로 갈수록 좁아지고, 흔들림은 중간이 최대
      const shrink=1-r*0.55;
      const swayAmt=sway * Math.sin(r*Math.PI); // 중간 최대 흔들림
      const nx=bx+Math.cos(angle)*(rW/2)*shrink + swayAmt;
      const ny=by+Math.sin(angle)*(rimH*.33)*(1-r*.3)+nd*r;
      ctx.lineTo(nx,ny);
    }
    ctx.stroke();
  }

  // ── 가로 링 ──
  for(let j=1;j<=rings;j++){
    const t=j/rings;
    const shrink=1-t*0.55;
    const ny=by+nd*t;
    // 흔들림: 아래로 갈수록 크게
    const sw2=sw*t*0.55;
    const al=Math.max(.08, .5-t*.04);
    ctx.strokeStyle=`rgba(210,210,255,${al})`;
    ctx.lineWidth=1.0-t*0.3;
    ctx.beginPath();
    ctx.ellipse(bx+sw2, ny, rW/2*shrink, rimH*.3*(1-t*.25), 0, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBallShadow(x,y,r){
  const flY=H*0.80;
  if(y>=flY) return;
  const t=Math.max(0,1-(flY-y)/(H*0.72));
  const sx=x+(x-W/2)*0.04*(1-t);
  const sw=r*1.4*(0.4+t*0.6), sh=r*0.2*(0.4+t*0.6);
  const sg=ctx.createRadialGradient(sx,flY,0,sx,flY,sw);
  sg.addColorStop(0,`rgba(0,0,0,${0.42*t})`); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save(); ctx.fillStyle=sg;
  ctx.beginPath(); ctx.ellipse(sx,flY,sw,sh,0,0,Math.PI*2); ctx.fill(); ctx.restore();
}

function drawBallShape(x,y,r,spin,alpha){
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.translate(x, y);
  ctx.rotate(spin || 0);

  // 원형 클립
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.clip();

  // 이미지 그리기 (중앙 정렬)
  if(_ballImg.complete && _ballImg.naturalWidth > 0){
    ctx.drawImage(_ballImg, -r, -r, r*2, r*2);
  } else {
    // 이미지 로드 전 폴백
    const mg=ctx.createRadialGradient(-r*.18,-r*.22,r*.01,0,0,r);
    mg.addColorStop(0,'#E8722A'); mg.addColorStop(.35,'#CC5510');
    mg.addColorStop(.72,'#8B2E04'); mg.addColorStop(1,'#4A1200');
    ctx.fillStyle=mg; ctx.fillRect(-r,-r,r*2,r*2);
  }

  // 하이라이트 오버레이 (광택 강조)
  const hl=ctx.createRadialGradient(-r*.3,-r*.36,0,-r*.3,-r*.36,r*.5);
  hl.addColorStop(0,'rgba(255,255,240,0.28)');
  hl.addColorStop(.4,'rgba(255,240,200,0.08)');
  hl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hl; ctx.fillRect(-r,-r,r*2,r*2);

  // AO 엣지
  const ao=ctx.createRadialGradient(0,0,r*.65,0,0,r);
  ao.addColorStop(0,'rgba(0,0,0,0)');
  ao.addColorStop(.8,'rgba(0,0,0,0)');
  ao.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=ao; ctx.fillRect(-r,-r,r*2,r*2);

  ctx.restore();
}

function drawBallFull(b){
  const alpha = 1;
  if(b.trail && b.trail.length>2 && !b.held){
    b.trail.forEach((pt,i)=>{
      const t=i/(b.trail.length);
      const a=t*0.12;
      const r=(pt.r||b.r)*(0.35+t*0.55);
      ctx.save(); ctx.globalAlpha=a;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
      ctx.fillStyle='#C04008'; ctx.fill(); ctx.restore();
    });
  }
  drawBallShadow(b.x,b.y,b.r);
  drawBallShape(b.x,b.y,b.r,b.spin||0,alpha);
}

// ════════════════════════════════════════════════════
// DRAW — HANDS
// ════════════════════════════════════════════════════
const FCHAINS=[[0,1,2,3,4],[0,5,6,7,8],[0,9,10,11,12],[0,13,14,15,16],[0,17,18,19,20]];
function lmXY(lm,i){ return {x:(1-lm[i].x)*W,y:lm[i].y*H}; }

function drawHandAvatar(lm){
  ctx.save();
  const palmIdx=[0,1,5,9,13,17];
  ctx.beginPath();
  palmIdx.forEach((pi,i)=>{ const p=lmXY(lm,pi); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
  ctx.closePath(); ctx.fillStyle='rgba(238,178,120,.52)'; ctx.fill();
  ctx.strokeStyle='rgba(170,100,50,.35)'; ctx.lineWidth=1.5; ctx.stroke();

  FCHAINS.forEach((chain,fi)=>{
    const pts=chain.map(i=>lmXY(lm,i));
    for(let s=0;s<pts.length-1;s++){
      const p0=pts[s],p1=pts[s+1];
      const len=Math.hypot(p1.x-p0.x,p1.y-p0.y)||1;
      const thick=fi===0?Math.max(11-s*1.8,4):Math.max(9-s*1.4,3);
      const dx=(p1.x-p0.x)/len,dy=(p1.y-p0.y)/len;
      const nx=-dy*thick/2,ny=dx*thick/2;
      ctx.beginPath();
      ctx.moveTo(p0.x+nx,p0.y+ny); ctx.lineTo(p1.x+nx,p1.y+ny);
      ctx.lineTo(p1.x-nx,p1.y-ny); ctx.lineTo(p0.x-nx,p0.y-ny); ctx.closePath();
      const sg=ctx.createLinearGradient(p0.x+nx,p0.y+ny,p0.x-nx,p0.y-ny);
      sg.addColorStop(0,'rgba(195,125,70,.9)'); sg.addColorStop(.35,'rgba(252,195,138,.97)');
      sg.addColorStop(.65,'rgba(228,162,102,.95)'); sg.addColorStop(1,'rgba(180,102,52,.88)');
      ctx.fillStyle=sg; ctx.fill();
      ctx.strokeStyle='rgba(140,80,35,.5)'; ctx.lineWidth=.8; ctx.stroke();
    }
    pts.forEach((p,pi)=>{
      if(pi===0&&fi>0) return;
      const r=fi===0?Math.max(7-pi*.9,2.5):Math.max(5.5-pi*.75,2);
      const jg=ctx.createRadialGradient(p.x-r*.35,p.y-r*.35,0,p.x,p.y,r);
      jg.addColorStop(0,'rgba(255,222,180,1)'); jg.addColorStop(.55,'rgba(220,148,84,.95)'); jg.addColorStop(1,'rgba(165,85,36,.85)');
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fillStyle=jg; ctx.fill();
      ctx.strokeStyle='rgba(120,62,24,.48)'; ctx.lineWidth=.7; ctx.stroke();
    });
  });
  [4,8,12,16,20].forEach(i=>{
    const p=lmXY(lm,i),p2=lmXY(lm,i-1);
    const angle=Math.atan2(p.y-p2.y,p.x-p2.x);
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(angle);
    ctx.beginPath(); ctx.ellipse(0,0,5,3.5,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,235,215,.76)'; ctx.fill();
    ctx.strokeStyle='rgba(185,138,100,.45)'; ctx.lineWidth=.7; ctx.stroke(); ctx.restore();
  });
  ctx.restore();
}

function drawHands(){
  if(mouseMode){
    ctx.save(); ctx.strokeStyle='rgba(255,200,60,.8)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx-12,my); ctx.lineTo(mx+12,my); ctx.moveTo(mx,my-12); ctx.lineTo(mx,my+12); ctx.stroke();
    ctx.restore();
    return;
  }
  ['L','R'].forEach(k=>{
    const h=hands[k]; if(!h||!h.lm) return;
    drawHandAvatar(h.lm);
  });
  // Grab radius indicator when not holding
  if(!heldBall){
    ['L','R'].forEach(k=>{
      const h=hands[k]; if(!h) return;
      const s=toSc(h.px,h.py);
      const col=k==='L'?'#00EEFF':'#FF8020';
      ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=2;
      ctx.globalAlpha=0.45+0.25*Math.sin(frame*.12);
      ctx.setLineDash([6,6]);
      ctx.beginPath(); ctx.arc(s.x,s.y,92,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    });
  }
}

// ════════════════════════════════════════════════════
// DRAW — FX + AIM
// ════════════════════════════════════════════════════
function drawFX(){
  parts.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life/p.ml;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);
    g.addColorStop(0,p.c); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
  pops.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life/70;
    ctx.font=`900 ${p.big?40:28}px Orbitron,monospace`; ctx.textAlign='center';
    ctx.shadowColor='#FF6A00'; ctx.shadowBlur=20;
    ctx.strokeStyle='rgba(40,10,0,.9)'; ctx.lineWidth=4; ctx.strokeText(p.t,p.x,p.y);
    ctx.fillStyle='#FFD060'; ctx.fillText(p.t,p.x,p.y); ctx.restore();
  });
}
function drawAim(){
  if(!heldBall) return;
  ctx.save(); ctx.setLineDash([8,12]);
  ctx.strokeStyle='rgba(255,200,60,.2)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(heldBall.x,heldBall.y); ctx.lineTo(hoop.x,hoop.y); ctx.stroke();
  ctx.restore();
}

// ════════════════════════════════════════════════════
// RENDER — painter's order (depth sorting)
// ════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawAim();

  const allBalls=[
    ...pile.map(b=>({...b,spin:Math.sin(b.seed)*.7,trail:null})),
    ...flyBalls,
    ...(heldBall?[heldBall]:[])
  ];

  // 득점된 공은 항상 림 앞(네트 안)에 그림
  const behindRim = allBalls.filter(b=>!b.scored && b.y<hoop.y+28);
  const frontRim  = allBalls.filter(b=> b.scored || b.y>=hoop.y+28);

  behindRim.forEach(b=>drawBallFull(b));
  drawGoal();
  frontRim.forEach(b=>drawBallFull(b));

  drawHands();
  drawFX();
}

// ════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════
function loop(){ update(); render(); requestAnimationFrame(loop); }

// ════════════════════════════════════════════════════
// GAME FLOW
// ════════════════════════════════════════════════════
async function startGame(){
  document.getElementById('startSc').style.display='none';
  document.getElementById('overSc').style.display='none';
  gs.score=0; gs.timeLeft=60; gs.streak=0; gs.running=true;
  hoop.phase=0; parts=[]; pops=[]; netSwing=0; frame=0;
  flyBalls=[]; heldBall=null;
  document.getElementById('scoreV').textContent='0';
  document.getElementById('bestV').textContent=gs.best;
  const tv=document.getElementById('timerV'); tv.textContent='60'; tv.className='';
  updateStreak(); resize();
  clearInterval(gs.tim);
  gs.tim=setInterval(()=>{
    gs.timeLeft--;
    const tv=document.getElementById('timerV'); tv.textContent=gs.timeLeft;
    if(gs.timeLeft<=10) tv.className='danger';
    if(gs.timeLeft<=0){ clearInterval(gs.tim); endGame(); }
  },1000);
}
function endGame(){
  gs.running=false;
  if(gs.score>gs.best){ gs.best=gs.score; localStorage.setItem('ah3_best',gs.best); document.getElementById('newBestMsg').style.display='block'; }
  else document.getElementById('newBestMsg').style.display='none';
  document.getElementById('finalTxt').textContent='SCORE: '+gs.score;
  document.getElementById('overSc').style.display='flex';
}

let mpReady=false;
document.getElementById('startBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('startBtn');
  btn.textContent='연결 중...'; btn.disabled=true;
  if(!mpReady){ await initMP(); mpReady=true; }
  await startGame();
  btn.textContent='INSERT COIN 🪙'; btn.disabled=false;
});
document.getElementById('restartBtn').addEventListener('click',()=>startGame());

resize();
loop();

// ════════════════════════════════════════════════════
// TITLE SCREEN BALL  — 실사 농구공 애니메이션
// ════════════════════════════════════════════════════
(function initTitleBall(){
  const tc  = document.getElementById('titleBall');
  const tcx = tc.getContext('2d');
  const TR  = 110; // 타이틀 공 반지름
  tc.width  = TR*2 + 20;
  tc.height = TR*2 + 20;
  tc.style.width  = (TR*2+20)+'px';
  tc.style.height = (TR*2+20)+'px';

  let tspin=0, tbob=0;



  function drawTitleBallShadow(cx,cy,r){
    tcx.save();
    const sg=tcx.createRadialGradient(cx,cy+r+8,0,cx,cy+r+8,r*1.3);
    sg.addColorStop(0,'rgba(0,0,0,0.45)'); sg.addColorStop(1,'rgba(0,0,0,0)');
    tcx.fillStyle=sg;
    tcx.beginPath(); tcx.ellipse(cx,cy+r+8,r*1.1,r*0.22,0,0,Math.PI*2); tcx.fill();
    tcx.restore();
  }

  function titleLoop(){
    tcx.clearRect(0,0,tc.width,tc.height);
    tspin += 0.008; // 느리게 회전
    tbob  += 0.04;
    const bob = Math.sin(tbob) * 8; // 위아래 둥실
    const cx=tc.width/2, cy=tc.height/2 - 8 + bob;

    drawTitleBallShadow(cx, cy, TR);
    // 타이틀 볼 — 실제 이미지로 그리기
    tcx.save();
    tcx.translate(cx, cy);
    tcx.rotate(tspin);
    tcx.beginPath(); tcx.arc(0,0,TR,0,Math.PI*2); tcx.clip();
    if(_ballImg.complete && _ballImg.naturalWidth>0){
      tcx.drawImage(_ballImg, -TR, -TR, TR*2, TR*2);
    }
    // 하이라이트
    const thl=tcx.createRadialGradient(-TR*.3,-TR*.36,0,-TR*.3,-TR*.36,TR*.5);
    thl.addColorStop(0,'rgba(255,255,240,0.28)'); thl.addColorStop(.4,'rgba(255,240,200,0.08)'); thl.addColorStop(1,'rgba(0,0,0,0)');
    tcx.fillStyle=thl; tcx.fillRect(-TR,-TR,TR*2,TR*2);
    const tao=tcx.createRadialGradient(0,0,TR*.65,0,0,TR);
    tao.addColorStop(0,'rgba(0,0,0,0)'); tao.addColorStop(.8,'rgba(0,0,0,0)'); tao.addColorStop(1,'rgba(0,0,0,0.55)');
    tcx.fillStyle=tao; tcx.fillRect(-TR,-TR,TR*2,TR*2);
    tcx.restore();

    requestAnimationFrame(titleLoop);
  }
  titleLoop();
})();
</script>
